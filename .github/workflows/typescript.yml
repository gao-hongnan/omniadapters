name: TypeScript CI

on:
  push:
    paths:
      - "omniadapters-ts/**"
      - ".github/workflows/typescript.yml"
  pull_request:
    paths:
      - "omniadapters-ts/**"
      - ".github/workflows/typescript.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: omniadapters-ts

jobs:
  ci:
    name: TS Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: omniadapters-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
